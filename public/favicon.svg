<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!-- Edges -->
  <line x1="16" y1="16" x2="7"  y2="7"  stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="2 2"/>
  <line x1="16" y1="16" x2="25" y2="7"  stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="2 2"/>
  <line x1="16" y1="16" x2="7"  y2="25" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="2 2"/>
  <line x1="16" y1="16" x2="25" y2="25" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="2 2"/>

  <!-- Corner nodes -->
  <circle cx="7"  cy="7"  r="3.5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="25" cy="7"  r="3.5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="7"  cy="25" r="3.5" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="25" cy="25" r="3.5" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>

  <!-- Central hub node -->
  <circle cx="16" cy="16" r="5.5" fill="#6366f1"/>
  <circle cx="16" cy="16" r="3"   fill="#818cf8"/>
</svg>
